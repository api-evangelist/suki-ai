apis:
  - aid: suki-ai:suki-platform-api
    name: Suki Platform REST API
    description: The Suki Platform REST API and SDKs let healthcare technology partners embed Suki's
      ambient clinical documentation, dictation, voice command, and form-filling capabilities into
      EHRs, telehealth platforms, care management systems, and revenue-cycle tools. Authentication is
      partner-issued; the platform supports REST APIs, a Web SDK, a Headless Web SDK (React 18+
      beta), a native iOS Mobile SDK (Android coming), and an embedded Dictation SDK (iframe beta).
    humanURL: https://developer.suki.ai/documentation/overview
    baseURL: https://developer.suki.ai
