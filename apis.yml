name: Suki AI
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
description: Suki AI provides voice-enabled, ambient clinical intelligence used by clinicians to
  generate clinical notes, dictate, and complete documentation tasks across more than 400 health
  systems. Suki for Partners is a developer platform offering REST APIs and SDKs (Web SDK, Headless
  Web SDK, Mobile SDK for iOS, and Dictation SDK) that let healthcare technology companies embed
  ambient documentation, dictation, voice commands, and form filling into their applications.
  Partner credentials and access are issued through Suki rather than self-service public sign-up.
